<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2A0A45"/>
      <stop offset="60%" stop-color="#0D0820"/>
      <stop offset="100%" stop-color="#050310"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFE88A"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Moon glow -->
  <circle cx="160" cy="180" r="200" fill="url(#moonGlow)"/>

  <!-- Moon -->
  <circle cx="160" cy="180" r="110" fill="url(#moonGrad)"/>
  <!-- Moon craters -->
  <circle cx="120" cy="140" r="18" fill="rgba(0,0,0,0.12)"/>
  <circle cx="185" cy="210" r="12" fill="rgba(0,0,0,0.10)"/>
  <circle cx="145" cy="225" r="7"  fill="rgba(0,0,0,0.08)"/>

  <!-- Stars -->
  <g fill="white" filter="url(#glow)">
    <circle cx="420" cy="45"  r="2.5" opacity="0.9"/>
    <circle cx="680" cy="30"  r="1.8" opacity="0.7"/>
    <circle cx="850" cy="60"  r="2.2" opacity="0.85"/>
    <circle cx="1050" cy="40" r="1.5" opacity="0.6"/>
    <circle cx="950" cy="90"  r="2.0" opacity="0.8"/>
    <circle cx="780" cy="110" r="1.3" opacity="0.5"/>
    <circle cx="500" cy="80"  r="1.6" opacity="0.7"/>
    <circle cx="1100" cy="130"r="2.8" opacity="0.9"/>
    <circle cx="360" cy="130" r="1.4" opacity="0.6"/>
    <circle cx="1150" cy="200"r="1.8" opacity="0.75"/>
    <circle cx="1020" cy="180"r="1.2" opacity="0.5"/>
    <circle cx="320" cy="500" r="1.5" opacity="0.4"/>
    <circle cx="900" cy="520" r="2.0" opacity="0.6"/>
    <circle cx="1080" cy="480"r="1.6" opacity="0.5"/>
    <circle cx="450" cy="560" r="1.2" opacity="0.35"/>
    <circle cx="750" cy="580" r="1.8" opacity="0.45"/>
  </g>

  <!-- Star sparkles (✦ shape) -->
  <g fill="#C9A84C" opacity="0.6" font-size="18" font-family="serif">
    <text x="400" y="55">✦</text>
    <text x="1080" y="170">✦</text>
    <text x="290" y="420">✦</text>
  </g>

  <!-- Decorative left border line -->
  <rect x="0" y="0" width="5" height="630" fill="url(#moonGrad)" opacity="0.6"/>

  <!-- Content area — RTL, centered -->

  <!-- Eyebrow label -->
  <text
    x="600" y="220"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="22"
    fill="#C9A84C"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.9">✦  פורטל נשים יזמיות בישראל  ✦</text>

  <!-- Main title line 1 -->
  <text
    x="600" y="330"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="110"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    filter="url(#textGlow)"
    opacity="0.97">בזכות</text>

  <!-- Main title line 2 — gold -->
  <text
    x="600" y="440"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="110"
    font-weight="900"
    fill="#C9A84C"
    text-anchor="middle"
    filter="url(#textGlow)">עצמך</text>

  <!-- Divider -->
  <line x1="450" y1="468" x2="750" y2="468" stroke="#C9A84C" stroke-width="2" opacity="0.5"/>

  <!-- Tagline -->
  <text
    x="600" y="510"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="26"
    fill="rgba(255,255,255,0.75)"
    text-anchor="middle"
    letter-spacing="2">עוצמה נשית · יזמות · הצלחה אמיתית</text>

  <!-- Domain -->
  <text
    x="600" y="575"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="18"
    fill="rgba(201,168,76,0.6)"
    text-anchor="middle"
    letter-spacing="1">bezchut-atzmech.co.il</text>

  <!-- Bottom border -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#moonGrad)" opacity="0.5"/>
</svg>
