<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>OG Image Generator</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; gap: 16px; }
    canvas { border: 2px solid #444; max-width: 95vw; }
    button { padding: 12px 32px; background: #C9A84C; color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
    button:hover { background: #e8c55a; }
  </style>
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<button onclick="download()">⬇️ הורד og-image.jpg</button>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

function draw() {
  // Background gradient
  const bg = ctx.createRadialGradient(360, 252, 0, 360, 252, 840);
  bg.addColorStop(0,   '#2A0A45');
  bg.addColorStop(0.6, '#0D0820');
  bg.addColorStop(1,   '#050310');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 1200, 630);

  // Left border
  const borderGrad = ctx.createLinearGradient(0, 0, 0, 630);
  borderGrad.addColorStop(0,   '#FFE88A');
  borderGrad.addColorStop(0.5, '#C9A84C');
  borderGrad.addColorStop(1,   '#8B6914');
  ctx.fillStyle = borderGrad;
  ctx.fillRect(0, 0, 5, 630);

  // Moon glow
  const glow = ctx.createRadialGradient(160, 180, 0, 160, 180, 260);
  glow.addColorStop(0,   'rgba(201,168,76,0.3)');
  glow.addColorStop(1,   'rgba(201,168,76,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(160, 180, 260, 0, Math.PI*2); ctx.fill();

  // Moon
  const moon = ctx.createRadialGradient(130, 140, 10, 160, 180, 110);
  moon.addColorStop(0,   '#FFE88A');
  moon.addColorStop(0.5, '#C9A84C');
  moon.addColorStop(1,   '#8B6914');
  ctx.fillStyle = moon;
  ctx.beginPath(); ctx.arc(160, 180, 110, 0, Math.PI*2); ctx.fill();

  // Moon craters
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.arc(120, 140, 18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.beginPath(); ctx.arc(185, 210, 12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.arc(145, 225, 7, 0, Math.PI*2); ctx.fill();

  // Stars
  const stars = [
    [420,45,2.5,0.9],[680,30,1.8,0.7],[850,60,2.2,0.85],[1050,40,1.5,0.6],
    [950,90,2.0,0.8],[780,110,1.3,0.5],[500,80,1.6,0.7],[1100,130,2.8,0.9],
    [360,130,1.4,0.6],[1150,200,1.8,0.75],[1020,180,1.2,0.5],[320,500,1.5,0.4],
    [900,520,2.0,0.6],[1080,480,1.6,0.5],[450,560,1.2,0.35],[750,580,1.8,0.45],
    [600,160,1.5,0.5],[700,200,1.2,0.4],[1000,300,1.8,0.55]
  ];
  stars.forEach(([x,y,r,a]) => {
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  });

  // Eyebrow text
  ctx.save();
  ctx.font = '400 22px Arial';
  ctx.fillStyle = '#C9A84C';
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.9;
  ctx.fillText('✦  פורטל נשים יזמיות בישראל  ✦', 600, 220);
  ctx.restore();

  // Main title "בזכות" — white
  ctx.save();
  ctx.font = '900 108px Arial';
  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(150,80,200,0.8)';
  ctx.shadowBlur = 20;
  ctx.fillText('בזכות', 600, 330);
  ctx.restore();

  // Main title "עצמך" — gold
  ctx.save();
  ctx.font = '900 108px Arial';
  ctx.fillStyle = '#C9A84C';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(201,168,76,0.6)';
  ctx.shadowBlur = 20;
  ctx.fillText('עצמך', 600, 442);
  ctx.restore();

  // Divider line
  ctx.strokeStyle = 'rgba(201,168,76,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(450, 468); ctx.lineTo(750, 468); ctx.stroke();

  // Tagline
  ctx.save();
  ctx.font = '400 26px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.textAlign = 'center';
  ctx.fillText('עוצמה נשית · יזמות · הצלחה אמיתית', 600, 510);
  ctx.restore();

  // Domain
  ctx.save();
  ctx.font = '400 18px Arial';
  ctx.fillStyle = 'rgba(201,168,76,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('bezchut-atzmech.co.il', 600, 572);
  ctx.restore();

  // Bottom border
  ctx.fillStyle = borderGrad;
  ctx.fillRect(0, 620, 1200, 10);
}

function download() {
  const link = document.createElement('a');
  link.download = 'og-image.jpg';
  link.href = c.toDataURL('image/jpeg', 0.95);
  link.click();
}

draw();
</script>
</body>
</html>
